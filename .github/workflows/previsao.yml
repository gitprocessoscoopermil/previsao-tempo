name: Gerar Previsão do Tempo

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  gerar-imagem:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          pip install pillow requests cairosvg numpy

      - name: Instalar fontes
        run: |
          sudo apt-get install -y fonts-dejavu-core

      - name: Gerar imagem da previsão
        run: python gerar_previsao.py

      - name: Commit e push da imagem
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash
          git pull --rebase origin main
          git stash pop
          git add previsao.png
          git diff --staged --quiet || git commit -m "Atualiza previsao do tempo - $(date +'%d/%m/%Y %H:%M')"
          git push
